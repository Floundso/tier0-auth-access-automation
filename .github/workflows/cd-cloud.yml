name: CD - Cloud Automations

on:
  push:
    branches:
      - main
    paths:
      - 'cloud-automations/runbooks/**'
      - 'cloud-automations/logic-apps/**'
      - 'infrastructure/bicep/**'

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/automation-account.bicep \
            --verbose

      - name: Deploy Runbooks
        run: |
          for file in cloud-automations/runbooks/*.ps1; do
            runbookName=$(basename "$file" .ps1)
            az automation runbook replace-content \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --automation-account-name ${{ secrets.AZURE_AUTOMATION_ACCOUNT }} \
              --name "$runbookName" \
              --content @"$file"
            echo "Deployed: $runbookName"
          done
