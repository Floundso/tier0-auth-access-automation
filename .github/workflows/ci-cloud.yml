name: CI - Cloud Automations

on:
  pull_request:
    paths:
      - 'cloud-automations/**'
      - 'infrastructure/**'

jobs:
  lint-and-test:
    name: PSScriptAnalyzer + Pester + Bicep Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer `
            -Path ./cloud-automations/runbooks/ `
            -Recurse `
            -Severity Error, Warning
          if ($results) {
            $results | Format-List
            exit 1
          }

      - name: Credential Scan
        uses: microsoft/security-devops-action@v1
        with:
          categories: 'secrets'

      - name: Pester Tests
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = './cloud-automations/tests/'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults/cloud-results.xml'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Bicep Lint
        run: az bicep build --file infrastructure/bicep/automation-account.bicep
